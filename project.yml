name: "Do Now"
options:
  bundleIdPrefix: com.donow
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
settings:
  MARKETING_VERSION: "1.0"
  CURRENT_PROJECT_VERSION: "1"
  SWIFT_VERSION: "5.9"
  SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited)"
targets:
  Do Now:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.donow.app
      INFOPLIST_FILE: Info.plist
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "-"
    info:
      path: Info.plist
      properties:
        CFBundleName: "Do Now"
        CFBundleDisplayName: "Do Now"
        CFBundlePackageType: APPL
        CFBundleIconFile: "DoNow"
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
    postCompileScripts:
      - name: "Copy App Icon"
        script: |
          cp "${SRCROOT}/Resources/DoNow.icns" "${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/DoNow.icns"
        basedOnDependencyAnalysis: false
